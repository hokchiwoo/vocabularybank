// ---------- Helpers ----------
function esc(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function makeCloze(sentence, word) {
  var stem = word.length > 4 ? word.slice(0, word.length - 1) : word;
  var regex = new RegExp('\\b' + stem.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\w*\\b', 'gi');
  var blanked = sentence.replace(regex, '________');
  return blanked.indexOf('________') !== -1 ? blanked : sentence + ' ( ________ )';
}

function pad2(n) { return String(n).padStart(2, '0'); }
function pad3(n) { return String(n).padStart(3, '0'); }

function speak(text) {

function setFlash(msg) {

var INPUT_CLASS = 'w-full border-2 border-black px-3 py-3 text-sm bg-white focus:outline-none focus:bg-neutral-100 placeholder-neutral-400';
var DAY_MS = 86400000;

// ---------- Spaced repetition (Anki-style, simplified) ----------
// Each word may carry: srs = { interval (days), reps, dueAt (ms), lastResult }
// "Got it"  -> interval grows: 1 -> 2 -> 5 -> 12 -> 28 -> 64 ... days
// "Revisit" -> interval resets to 0 and the card is due immediately,
//              so it keeps returning until you mark it known.
function isDue(w) {
  return !w.srs || !w.srs.dueAt || w.srs.dueAt <= Date.now();
}

function dueLabel(w) {
  if (!w.srs || !w.srs.reps) return 'NEW \u65B0';
  if (w.srs.dueAt <= Date.now()) return 'DUE \u5230\u671F';
  var diff = w.srs.dueAt - Date.now();
  if (diff < DAY_MS) return 'NEXT \u4E0B\u6B21 <1d';
  return 'NEXT \u4E0B\u6B21 ' + Math.round(diff / DAY_MS) + 'd';
}

// ---------- Flashcard deck (session queue) ----------
// The pool respects the All/Due filter and excludes cards already rated
// this session. Newly added words appear at the front even when shuffled.
function deckPool() {
  var pool = state.words;
  if (state.deckMode === 'due') pool = pool.filter(isDue);
  return pool.filter(function (w) { return !state.rated[w.id]; });
}

function rebuildDeck() {
  var ids = deckPool().map(function (w) { return w.id; });
  if (state.deckShuffled) {
    var kept = state.deckIds.filter(function (id) { return ids.indexOf(id) !== -1; });
    var added = ids.filter(function (id) { return kept.indexOf(id) === -1; });
    state.deckIds = added.concat(kept);
  } else {
    state.deckIds = ids;
  }
  if (state.cardIndex >= state.deckIds.length) { state.cardIndex = 0; state.flipped = false; }
}

function wordById(id) {
  for (var i = 0; i < state.words.length; i++) {
    if (state.words[i].id === id) return state.words[i];
  }
  return null;
}

function resetSession() {
  state.rated = {};
  state.sessionStats = { good: 0, again: 0 };
  state.lastRating = '';
  state.cardIndex = 0;
  state.flipped = false;
}

function shuffleDeck() {
  state.deckShuffled = true;
  state.deckIds = shuffle(deckPool().map(function (w) { return w.id; }));
  state.cardIndex = 0;
  state.flipped = false;
  render();
}

function resetDeck() {
  state.deckShuffled = false;
  state.deckIds = deckPool().map(function (w) { return w.id; });
  state.cardIndex = 0;
  state.flipped = false;
  render();
}

// Rate the current card. known=true (swipe left / "Got it") grows the
// interval; known=false (swipe right / "Revisit") keeps it due so it
// reappears next session, just like Anki's "Again".
function rateCard(known) {
  if (state.deckIds.length === 0) return;
  var id = state.deckIds[state.cardIndex];
  var w = wordById(id);
  if (!w) return;
  var prev = w.srs || { interval: 0, reps: 0 };
  var srs;
  var msg;
  if (known) {
    var next = prev.interval <= 0 ? 1 : Math.round(prev.interval * 2.3);
    srs = { interval: next, reps: (prev.reps || 0) + 1, dueAt: Date.now() + next * DAY_MS, lastResult: 'good' };
    state.sessionStats.good++;
    msg = '\u2713 \u201C' + w.word + '\u201D \u2014 next review in ' + next + ' day' + (next > 1 ? 's' : '') + ' ' + next + ' \u5929\u5F8C\u518D\u8907\u7FD2';
  } else {
    srs = { interval: 0, reps: (prev.reps || 0) + 1, dueAt: Date.now(), lastResult: 'again' };
    state.sessionStats.again++;
    msg = '\u21BB \u201C' + w.word + '\u201D \u2014 will keep returning until you know it \u6703\u6301\u7E8C\u51FA\u73FE\u76F4\u5230\u4F60\u8A18\u4F4F\u5B83';
  }
  wordsRef().doc(String(id)).update({ srs: srs }).catch(function (err) {
    state.syncError = 'Could not save review \u7121\u6CD5\u5132\u5B58\u8907\u7FD2\u7D00\u9304: ' + err.message;
  });
  state.rated[id] = true;
  state.lastRating = msg;
  state.flipped = false;
  state.deckIds.splice(state.cardIndex, 1);
  if (state.cardIndex >= state.deckIds.length) state.cardIndex = 0;
  render();
}

// ---------- Swipe gesture (Tinder/Anki-style) ----------
var swipe = { active: false, startX: 0, startY: 0, dx: 0, startT: 0 };

function resetHints() {
  var k = document.getElementById('hintKnow');
  var a = document.getElementById('hintAgain');
  if (k) k.style.opacity = 0;
  if (a) a.style.opacity = 0;
}

document.addEventListener('pointerdown', function (e) {
  var card = e.target.closest('#swipeCard');
  if (!card) return;
  if (e.target.closest('[data-action]')) return; // e.g. the speak button
  swipe.active = true;
  swipe.startX = e.clientX;
  swipe.startY = e.clientY;
  swipe.dx = 0;
  swipe.startT = Date.now();
  card.style.transition = 'none';
  if (card.setPointerCapture) {
    try { card.setPointerCapture(e.pointerId); } catch (err) { /* ignore */ }
  }
});

document.addEventListener('pointermove', function (e) {
  if (!swipe.active) return;
  var card = document.getElementById('swipeCard');
  if (!card) { swipe.active = false; return; }
  swipe.dx = e.clientX - swipe.startX;
  card.style.transform = 'translateX(' + swipe.dx + 'px) rotate(' + (swipe.dx * 0.04) + 'deg)';
  var op = Math.min(Math.abs(swipe.dx) / 100, 1);
  var k = document.getElementById('hintKnow');
  var a = document.getElementById('hintAgain');
  if (swipe.dx < 0) { if (k) k.style.opacity = op; if (a) a.style.opacity = 0; }
  else { if (a) a.style.opacity = op; if (k) k.style.opacity = 0; }
});

function endSwipe() {
  if (!swipe.active) return;
  swipe.active = false;
  var card = document.getElementById('swipeCard');
  if (!card) return;
  var dx = swipe.dx;
  var THRESHOLD = 90;

  if (Math.abs(dx) >= THRESHOLD) {
    // Fly the card off screen, then rate it: left = got it, right = revisit
    var dir = dx > 0 ? 1 : -1;
    card.style.transition = 'transform 0.25s ease-out, opacity 0.25s ease-out';
    card.style.transform = 'translateX(' + dir * window.innerWidth + 'px) rotate(' + dir * 20 + 'deg)';
    card.style.opacity = '0';
    setTimeout(function () { rateCard(dir === -1); }, 240);
  } else if (Math.abs(dx) < 8 && Date.now() - swipe.startT < 500) {
    // Treated as a tap: flip the card
    card.style.transform = '';
    state.flipped = !state.flipped;
    var inner = document.getElementById('cardInner');
    if (inner) inner.classList.toggle('flipped', state.flipped);
    resetHints();
  } else {
    // Not far enough: snap back
    card.style.transition = 'transform 0.2s ease-out';
    card.style.transform = '';
    resetHints();
  }
}
document.addEventListener('pointerup', endSwipe);
document.addEventListener('pointercancel', function () {
  if (!swipe.active) return;
  swipe.active = false;
  var card = document.getElementById('swipeCard');
  if (card) { card.style.transition = 'transform 0.2s ease-out'; card.style.transform = ''; }
  resetHints();
});

// ---------- Firestore: auth + live sync ----------
function wordsRef() {
  return db.collection('users').doc(state.user.uid).collection('words');
}

auth.onAuthStateChanged(function (u) {
  state.user = u;
  state.authReady = true;
  state.signingIn = false;
  didCheckSeed = false;
  if (unsubscribeWords) { unsubscribeWords(); unsubscribeWords = null; }
  if (u) {
    state.words = loadCache(u.uid); // instant paint while cloud loads
    resetSession();
    rebuildDeck();
    startSync(u);
  } else {
    state.words = [];
    state.deckIds = [];
    state.deckShuffled = false;
    state.deckMode = 'all';
    resetSession();
    state.tab = 'bank';
    state.quiz = null;
    state.senses = null;
    state.editingId = null;
    state.importMsg = '';
  }
  render();
});

function startSync(u) {
  unsubscribeWords = db.collection('users').doc(u.uid).collection('words')
    .orderBy('createdAt', 'desc')
    .onSnapshot(function (snap) {
      var words = [];
      snap.forEach(function (doc) {
        var w = doc.data();
        w.id = doc.id;
        words.push(w);
      });
      if (words.length === 0) maybeSeed(u);
      state.words = words;
      saveCache(u.uid, words);
      state.syncError = '';
      rebuildDeck();
      render();
    }, function (err) {
      state.syncError = 'Could not sync with the cloud \u7121\u6CD5\u540C\u6B65: ' + err.message;
      render();
    });
}

// First login on an empty account: migrate words saved by the old
// localStorage-only version of this app, or fall back to the seed words.
function maybeSeed(u) {
  if (didCheckSeed) return;
  didCheckSeed = true;
  var userDoc = db.collection('users').doc(u.uid);
  userDoc.get().then(function (doc) {
    if (doc.exists && doc.data() && doc.data().seeded) return; // already initialised before
    var initial = SEED_WORDS;
    try {
      var raw = localStorage.getItem(LEGACY_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) initial = parsed;
      }
    } catch (e) { /* no legacy data */ }
    var batch = db.batch();
    var ref = userDoc.collection('words');
    var base = Date.now();
    initial.forEach(function (w, i) {
      batch.set(ref.doc(String(base - i)), {
        word: w.word || '',
        pos: w.pos || 'noun',
        ipa: w.ipa || '',
        meaning: w.meaning || '',
        example: w.example || '',
        createdAt: base - i
      });
    });
    batch.set(userDoc, {
      seeded: true,
      name: u.displayName || '',
      email: u.email || ''
    }, { merge: true });
    return batch.commit();
  }).catch(function (err) {
    state.syncError = 'Setup error \u521D\u59CB\u5316\u932F\u8AA4: ' + err.message;
    render();
  });
}

function signInGoogle() {
  state.authError = '';
  state.signingIn = true;
  render();
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function (err) {
    state.signingIn = false;
    if (err.code === 'auth/popup-blocked') {
      auth.signInWithRedirect(provider);
      return;
    }
    if (err.code === 'auth/unauthorized-domain') {
      state.authError = 'This website\u2019s domain is not authorised in Firebase. Add it under Authentication \u2192 Settings \u2192 Authorized domains. \u6B64\u7DB2\u57DF\u5C1A\u672A\u5728 Firebase \u63A7\u5236\u53F0\u4E2D\u6388\u6B0A\u3002';
    } else if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
      state.authError = err.message;
    }
    render();
  });
}

// ---------- Export / Import ----------
function exportWords() {
  var payload = {
    app: 'wordbank',
    version: 1,
    exportedAt: new Date().toISOString(),
    words: state.words.map(function (w) {
      return {
        word: w.word || '',
        pos: w.pos || 'noun',
        ipa: w.ipa || '',
        meaning: w.meaning || '',
        example: w.example || ''
      };
    })
  };
  var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'wordbank-export-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  state.importMsg = 'Exported ' + payload.words.length + ' entries \u5DF2\u532F\u51FA ' + payload.words.length + ' \u500B\u8A5E\u689D\u3002';
  state.importIsError = false;
  render();
}

function importFromFile(file) {
  if (!file) return;
  state.importing = true;
  state.importMsg = '';
  state.importIsError = false;
  render();

  var reader = new FileReader();
  reader.onerror = function () {
    state.importing = false;
    state.importMsg = 'Could not read the file. \u7121\u6CD5\u8B80\u53D6\u6A94\u6848\u3002';
    state.importIsError = true;
    render();
  };
  reader.onload = function () {
    var incoming;
    try {
      var parsed = JSON.parse(reader.result);
      // Accept both the export format { words: [...] } and a bare array
      incoming = Array.isArray(parsed) ? parsed : parsed.words;
      if (!Array.isArray(incoming)) throw new Error('bad format');
    } catch (e) {
      state.importing = false;
      state.importMsg = 'This is not a valid Word.bank export file. \u9019\u4E0D\u662F\u6709\u6548\u7684 Word.bank \u532F\u51FA\u6A94\u3002';
      state.importIsError = true;
      render();
      return;
    }

    // Validate and normalise entries (capitalisation is preserved)
    var valid = [];
    incoming.forEach(function (w) {
      if (!w || typeof w !== 'object') return;
      var word = String(w.word || '').trim();
      var meaning = String(w.meaning || '').trim();
      if (!word || !meaning) return;
      valid.push({
        word: word,
        pos: POS_OPTIONS.indexOf(w.pos) !== -1 ? w.pos : 'noun',
        ipa: String(w.ipa || '').trim(),
        meaning: meaning,
        example: String(w.example || '').trim()
      });
    });

    if (valid.length === 0) {
      state.importing = false;
      state.importMsg = 'No valid entries found in the file. \u6A94\u6848\u4E2D\u6C92\u6709\u6709\u6548\u7684\u8A5E\u689D\u3002';
      state.importIsError = true;
      render();
      return;
    }

    // Skip entries that already exist (same word + same meaning,
    // compared case-insensitively), and duplicates within the file itself
    var existing = {};
    state.words.forEach(function (w) {
      existing[(w.word || '').toLowerCase() + '\u0000' + (w.meaning || '').toLowerCase()] = true;
    });
    var toAdd = [];
    var skipped = 0;
    valid.forEach(function (w) {
      var key = w.word.toLowerCase() + '\u0000' + w.meaning.toLowerCase();
      if (existing[key]) { skipped++; return; }
      existing[key] = true;
      toAdd.push(w);
    });

    if (toAdd.length === 0) {
      state.importing = false;
      state.importMsg = 'Nothing to import \u2014 all ' + skipped + ' entries already exist. \u6240\u6709\u8A5E\u689D\u90FD\u5DF2\u5B58\u5728\uFF0C\u7121\u9700\u532F\u5165\u3002';
      state.importIsError = false;
      render();
      return;
    }

    // Firestore batches are limited to 500 writes each
    var base = Date.now();
    var batches = [];
    for (var i = 0; i < toAdd.length; i += 450) {
      var batch = db.batch();
      toAdd.slice(i, i + 450).forEach(function (w, j) {
        var createdAt = base - (i + j);
        batch.set(wordsRef().doc(String(createdAt)), {
          word: w.word,
          pos: w.pos,
          ipa: w.ipa,
          meaning: w.meaning,
          example: w.example,
          createdAt: createdAt
        });
      });
      batches.push(batch.commit());
    }

    Promise.all(batches).then(function () {
      state.importing = false;
      state.importMsg = 'Imported ' + toAdd.length + ' entries' + (skipped ? ', skipped ' + skipped + ' duplicates' : '') + '. \u5DF2\u532F\u5165 ' + toAdd.length + ' \u500B\u8A5E\u689D' + (skipped ? '\uFF0C\u8DF3\u904E ' + skipped + ' \u500B\u91CD\u8907\u9805' : '') + '\u3002';
      state.importIsError = false;
      state.cardIndex = 0;
      render();
    }).catch(function (err) {
      state.importing = false;
      state.importMsg = 'Import failed \u532F\u5165\u5931\u6557: ' + err.message;
      state.importIsError = true;
      render();
    });
  };
  reader.readAsText(file);
}

  if (eligible.length < 4) {
    return '<div class="pt-8"><p class="text-sm text-neutral-400 py-10">You need at least 4 words with example sentences to generate a test. \u81F3\u5C11\u9700\u8981 4 \u500B\u542B\u4F8B\u53E5\u7684\u55AE\u5B57\u624D\u80FD\u7522\u751F\u6E2C\u9A57\u3002</p></div>';
  }

  if (!state.quiz) {
    return '<div class="pt-8"><div class="border-4 border-black p-8">' +
      '<p class="text-xs uppercase tracking-widest text-red-600 mb-3">Cloze recall \u586B\u7A7A\u6E2C\u9A57</p>' +
      '<h2 class="text-3xl font-bold tracking-tight leading-tight mb-4">The word is removed.<br>You put it back.</h2>' +
      '<p class="text-sm text-neutral-600 mb-8 max-w-md">Each target word is blanked out of its example sentence. Choose the correct word from four options. Questions and options are freshly shuffled every time. \u4F8B\u53E5\u4E2D\u7684\u76EE\u6A19\u55AE\u5B57\u5DF2\u88AB\u6316\u7A7A\uFF0C\u8ACB\u5F9E\u56DB\u500B\u9078\u9805\u4E2D\u9078\u51FA\u6B63\u78BA\u7684\u5B57\uFF1B\u6BCF\u6B21\u984C\u76EE\u8207\u9078\u9805\u90FD\u6703\u91CD\u65B0\u6D17\u724C\u3002</p>' +
      '<button data-action="start-quiz" class="flex items-center gap-3 bg-black hover:bg-red-600 text-white text-xs font-bold uppercase tracking-widest px-8 py-4 transition-colors">' +
        '<span class="pointer-events-none">Start \u958B\u59CB \u2014 ' + Math.min(10, eligible.length) + ' questions</span>' +
        '<span class="pointer-events-none">' + IC.arrow(14) + '</span>' +
      '</button>' +
    '</div></div>';
  }

  if (state.quiz.finished) {
    var q = state.quiz;
    var verdict = q.score === q.questions.length
      ? 'Perfect score. Outstanding recall. \u6EFF\u5206\uFF0C\u8A18\u61B6\u529B\u9A5A\u4EBA\u3002'
      : q.score >= q.questions.length * 0.7
        ? 'Good. Review the missed words in the flashcards. \u4E0D\u932F\uFF0C\u7528\u5B57\u5361\u8907\u7FD2\u7B54\u932F\u7684\u55AE\u5B57\u5427\u3002'
        : 'Keep practising with the flashcards, then try again. \u7528\u5B57\u5361\u591A\u52A0\u7DF4\u7FD2\u5F8C\u518D\u8A66\u4E00\u6B21\u3002';
    return '<div class="pt-8"><div class="border-4 border-black p-8 fade-in">' +
      '<p class="text-xs uppercase tracking-widest text-red-600 mb-3">\u7D50\u679C \u2014 Result</p>' +
      '<p class="text-6xl sm:text-7xl font-bold tracking-tight">' + q.score + '<span class="text-neutral-300">/' + q.questions.length + '</span></p>' +
      '<p class="text-sm text-neutral-600 mt-4 mb-8 max-w-md">' + verdict + '</p>' +
      '<button data-action="start-quiz" class="flex items-center gap-3 bg-black hover:bg-red-600 text-white text-xs font-bold uppercase tracking-widest px-8 py-4 transition-colors">' +
        '<span class="pointer-events-none">' + IC.shuffle(14) + '</span><span class="pointer-events-none">Reshuffle & retake \u91CD\u6D17\u518D\u6E2C</span>' +
      '</button>' +
    '</div></div>';
  }

  var quiz = state.quiz;
  var question = quiz.questions[quiz.current];
  var pct = (quiz.current / quiz.questions.length) * 100;
  var letters = ['A', 'B', 'C', 'D'];

  var html = '<div class="pt-8">' +
    '<div class="flex justify-between items-baseline mb-2">' +
      '<p class="text-xs uppercase tracking-widest">\u984C\u76EE ' + pad2(quiz.current + 1) + ' / ' + pad2(quiz.questions.length) + '</p>' +
      '<div class="flex items-baseline gap-4">' +
        '<p class="text-xs uppercase tracking-widest text-neutral-500">Score \u5F97\u5206 ' + quiz.score + '</p>' +
        '<button data-action="start-quiz" title="Restart with freshly shuffled questions \u91CD\u65B0\u6D17\u724C\u4E26\u91CD\u65B0\u958B\u59CB" class="flex items-center gap-1 text-xs uppercase tracking-widest text-neutral-500 hover:text-red-600 transition-colors">' +
          '<span class="pointer-events-none">' + IC.shuffle(12) + '</span>' +
          '<span class="pointer-events-none">Reshuffle \u91CD\u6D17</span>' +
        '</button>' +
      '</div>' +
    '</div>' +
    '<div class="w-full h-1 bg-neutral-200 mb-8"><div class="h-1 bg-red-600 transition-all duration-300" style="width:' + pct + '%"></div></div>' +
    '<p class="text-xs uppercase tracking-widest text-red-600 mb-3">Fill the gap \u586B\u7A7A</p>' +
    '<p class="text-xl sm:text-2xl font-bold tracking-tight leading-snug mb-3">\u300C' + esc(question.cloze) + '\u300D</p>' +
    '<p class="text-xs text-neutral-500 mb-8">' + esc(question.target.pos) + ' \u2014 ' + esc(question.target.meaning) + '</p>' +
    '<div class="border-t-2 border-black">';

  question.choices.forEach(function (choice, ci) {
    var isCorrect = choice === question.target.word;
    var isSelected = quiz.selected === choice;
    var style = 'hover:bg-neutral-100';
    if (quiz.selected !== null) {
      if (isCorrect) style = 'bg-black text-white';
      else if (isSelected) style = 'bg-red-600 text-white';
      else style = 'text-neutral-300';
    }
    html += '<button data-action="answer" data-choice="' + esc(choice) + '" ' + (quiz.selected !== null ? 'disabled' : '') +
      ' class="w-full flex items-baseline gap-4 text-left border-b-2 border-black px-2 py-4 font-bold transition-colors ' + style + '">' +
      '<span class="text-xs pointer-events-none">' + letters[ci] + '</span>' +
      '<span class="text-lg pointer-events-none">' + esc(choice) + '</span>' +
      (quiz.selected !== null && isCorrect ? '<span class="ml-auto text-xs uppercase tracking-widest pointer-events-none">\u6B63\u78BA \u2713</span>' : '') +
      (quiz.selected !== null && isSelected && !isCorrect ? '<span class="ml-auto text-xs uppercase tracking-widest pointer-events-none">\u932F\u8AA4 \u00D7</span>' : '') +
    '</button>';
  });
  html += '</div>';

  if (quiz.selected !== null) {
    html += '<div class="mt-6 fade-in">' +
      '<p class="text-sm text-neutral-600 border-l-4 border-black pl-3 mb-6">\u300C' + esc(question.target.example) + '\u300D</p>' +
      '<button data-action="next-q" class="w-full flex items-center justify-center gap-3 bg-black hover:bg-red-600 text-white text-xs font-bold uppercase tracking-widest py-4 transition-colors">' +
        '<span class="pointer-events-none">' + (quiz.current + 1 >= quiz.questions.length ? 'See result \u770B\u7D50\u679C' : 'Next \u4E0B\u4E00\u984C') + '</span>' +
        '<span class="pointer-events-none">' + IC.arrow(14) + '</span>' +
      '</button>' +
    '</div>';
  }
  html += '</div>';
  return html;
}

// ---------- Main render ----------
function render() {
  var app = document.getElementById('app');
  if (!state.authReady) { app.innerHTML = loadingHTML(); return; }
  if (!state.user) { app.innerHTML = signInHTML(); return; }
  var content = state.tab === 'bank' ? bankHTML() : state.tab === 'cards' ? cardsHTML() : quizHTML();
  app.innerHTML = headerHTML() + tabsHTML() + content + footerHTML();
}

// ---------- Dictionary lookup ----------
function doLookup() {
  var term = state.searchTerm.trim();
  if (!term || state.searching) return;
  state.searching = true;
  state.searchError = '';
  state.senses = null;
  state.savedFlash = '';
  render();

  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/' + encodeURIComponent(term))
    .then(function (res) {
      if (!res.ok) {
        if (res.status === 404) {
          throw new Error('No entry found for "' + term + '" \u67E5\u7121\u6B64\u5B57\u3002Check the spelling, or add it manually.');
        }
        throw new Error('The dictionary service returned an error. Try again. \u5B57\u5178\u670D\u52D9\u767C\u751F\u932F\u8AA4\uFF0C\u8ACB\u91CD\u8A66\u3002');
      }
      return res.json();
    })
    .then(function (data) {
      var collected = [];
      data.forEach(function (entry) {
        var ipa = entry.phonetic || '';
        if (!ipa && entry.phonetics) {
          for (var i = 0; i < entry.phonetics.length; i++) {
            if (entry.phonetics[i].text) { ipa = entry.phonetics[i].text; break; }
          }
        }
        (entry.meanings || []).forEach(function (m) {
          (m.definitions || []).forEach(function (d) {
            collected.push({
              word: entry.word,
              pos: m.partOfSpeech || 'noun',
              ipa: ipa,
              meaning: d.definition,
              example: d.example || ''
            });
          });
        });
      });
      if (collected.length === 0) {
        throw new Error('No definitions found for "' + term + '". Add it manually. \u67E5\u7121\u91CB\u7FA9\uFF0C\u8ACB\u624B\u52D5\u65B0\u589E\u3002');
      }
      collected.sort(function (a, b) { return (b.example ? 1 : 0) - (a.example ? 1 : 0); });
      state.senses = collected.slice(0, 8);
    })
    .catch(function (err) {
      if (err instanceof TypeError) {
        state.searchError = 'Could not reach the dictionary service. Check your internet connection, or add the word manually. \u7121\u6CD5\u9023\u7DDA\u81F3\u5B57\u5178\u670D\u52D9\uFF0C\u8ACB\u6AA2\u67E5\u7DB2\u8DEF\u9023\u7DDA\u6216\u624B\u52D5\u65B0\u589E\u3002';
      } else {
        state.searchError = err.message;
      }
    })
    .finally(function () {
      state.searching = false;
      render();
    });
}

// ---------- Actions ----------
function persistWord(entry) {
  // Writes to Firestore; the live snapshot listener updates the UI,
  // including instantly via latency compensation (works offline too).
  var id = String(entry.createdAt);
  wordsRef().doc(id).set(entry).catch(function (err) {
    state.syncError = 'Could not save to the cloud \u7121\u6CD5\u5132\u5B58: ' + err.message;
    render();
  });
}

// Open the manual form pre-filled from a dictionary sense so the user
// can write their own example sentence (or adapt the dictionary one).
function openFormFromSense(s, notice, prefillExample) {
  state.form = {
    word: s.word,
    pos: POS_OPTIONS.indexOf(s.pos) !== -1 ? s.pos : 'noun',
    ipa: s.ipa || '',
    meaning: s.meaning || '',
    example: prefillExample ? (s.example || '') : ''
  };
  state.showForm = true;
  state.senses = null;
  state.searchTerm = '';
  state.formError = '';
  state.formNotice = notice;
  render();
  var sec = document.getElementById('manualSection');
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function saveSense(i) {
  var s = state.senses[i];
  if (!s) return;
  if (!s.example) {
    openFormFromSense(s, 'This sense has no example sentence \u2014 write one so it can be used in the cloze test. \u6B64\u91CB\u7FA9\u6C92\u6709\u4F8B\u53E5\uFF0C\u8ACB\u81EA\u884C\u586B\u5BEB\u4E00\u53E5\uFF0C\u4EE5\u4FBF\u7528\u65BC\u586B\u7A7A\u6E2C\u9A57\u3002', false);
    return;
  }
  persistWord({
    word: s.word,
    pos: s.pos,
    ipa: s.ipa,
    meaning: s.meaning,
    example: s.example,
    createdAt: Date.now()
  });
  state.senses = null;
  state.searchTerm = '';
  state.cardIndex = 0;
  setFlash('"' + s.word + '" added \u5DF2\u65B0\u589E');
  render();
}

// "Write my own example" on a sense: keep the word, IPA and meaning,
// pre-fill the dictionary example as a starting point (if any) and let
// the user rewrite or replace it before saving.
function ownExample(i) {
  var s = state.senses[i];
  if (!s) return;
  openFormFromSense(s, 'Write your own example sentence below' + (s.example ? ' \u2014 the dictionary\u2019s sentence is pre-filled as a starting point, edit or replace it freely.' : '.') + ' \u8ACB\u5728\u4E0B\u65B9\u81EA\u5BEB\u4F8B\u53E5' + (s.example ? '\uFF0C\u5B57\u5178\u4F8B\u53E5\u5DF2\u9810\u586B\u4F5C\u70BA\u53C3\u8003\uFF0C\u53EF\u81EA\u7531\u4FEE\u6539\u6216\u66FF\u63DB\u3002' : '\u3002'), true);
}

// "None of these fits" — open the manual form pre-filled with the
// searched word and its IPA, so the user writes their own meaning/example.
function manualFromSearch() {
  var word = state.searchTerm.trim();
  var ipa = '';
  var pos = 'noun';
  if (state.senses && state.senses.length > 0) {
    word = state.senses[0].word;
    ipa = state.senses[0].ipa || '';
    if (POS_OPTIONS.indexOf(state.senses[0].pos) !== -1) pos = state.senses[0].pos;
  }
  state.form = { word: word, pos: pos, ipa: ipa, meaning: '', example: '' };
  state.formError = '';
  state.formNotice = '';
  state.showForm = true;
  state.senses = null;
  state.searchTerm = '';
  render();
  var sec = document.getElementById('manualSection');
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function addWord() {
  var f = state.form;
  if (!f.word.trim() || !f.meaning.trim() || !f.example.trim()) {
    state.formError = 'Fill in the word, meaning and example sentence. \u8ACB\u586B\u5BEB\u55AE\u5B57\u3001\u91CB\u7FA9\u8207\u4F8B\u53E5\u3002';
    render();
    return;
  }
  var savedWord = f.word.trim(); // capitalisation preserved, e.g. "Sophie's choice"
  persistWord({
    word: savedWord,
    pos: f.pos,
    ipa: f.ipa.trim(),
    meaning: f.meaning.trim(),
    example: f.example.trim(),
    createdAt: Date.now()
  });
  setFlash('"' + savedWord + '" added \u5DF2\u65B0\u589E');
  state.form = { word: '', pos: 'noun', ipa: '', meaning: '', example: '' };
  state.formError = '';
  state.formNotice = '';
  state.showForm = false;
  state.cardIndex = 0;
  render();
}

// ---------- Editing ----------
function startEdit(id) {
  var w = wordById(id);
  if (!w) return;
  state.editingId = id;
  state.editForm = {
    word: w.word || '',
    pos: POS_OPTIONS.indexOf(w.pos) !== -1 ? w.pos : 'noun',
    ipa: w.ipa || '',
    meaning: w.meaning || '',
    example: w.example || ''
  };
  state.editError = '';
  render();
}

function saveEdit() {
  var f = state.editForm;
  if (!f.word.trim() || !f.meaning.trim() || !f.example.trim()) {
    state.editError = 'Fill in the word, meaning and example sentence. \u8ACB\u586B\u5BEB\u55AE\u5B57\u3001\u91CB\u7FA9\u8207\u4F8B\u53E5\u3002';
    render();
    return;
  }
  var savedWord = f.word.trim(); // capitalisation preserved
  wordsRef().doc(String(state.editingId)).update({
    word: savedWord,
    pos: f.pos,
    ipa: f.ipa.trim(),
    meaning: f.meaning.trim(),
    example: f.example.trim()
  }).catch(function (err) {
    state.syncError = 'Could not save changes \u7121\u6CD5\u5132\u5B58\u8B8A\u66F4: ' + err.message;
    render();
  });
  state.editingId = null;
  state.editError = '';
  setFlash('"' + savedWord + '" updated \u5DF2\u66F4\u65B0');
  render();
}

function cancelEdit() {
  state.editingId = null;
  state.editError = '';
  render();
}

function deleteWord(id) {
  wordsRef().doc(String(id)).delete().catch(function (err) {
    state.syncError = 'Could not delete \u7121\u6CD5\u522A\u9664: ' + err.message;
    render();
  });
  state.cardIndex = 0;
  state.flipped = false;
}

function startQuiz() {
  var pool = shuffle(state.words.filter(function (w) { return w.example; }));
  var num = Math.min(10, pool.length);
  var questions = pool.slice(0, num).map(function (target) {
    var distractors = shuffle(state.words.filter(function (w) { return w.id !== target.id; }))
      .slice(0, 3)
      .map(function (w) { return w.word; });
    return {
      target: target,
      cloze: makeCloze(target.example, target.word),
      choices: shuffle([target.word].concat(distractors))
    };
  });
  state.quiz = { questions: questions, current: 0, score: 0, selected: null, finished: false };
  render();
}

function answerQuiz(choice) {
  var q = state.quiz;
  if (!q || q.selected !== null) return;
  q.selected = choice;
  if (choice === q.questions[q.current].target.word) q.score++;
  render();
}

function nextQuestion() {
  var q = state.quiz;
  if (q.current + 1 >= q.questions.length) {
    q.finished = true;
  } else {
    q.current++;
    q.selected = null;
  }
  render();
}

// ---------- Event delegation ----------
document.addEventListener('click', function (e) {
  var el = e.target.closest('[data-action]');
  if (!el) return;
  var action = el.getAttribute('data-action');

  if (action === 'google-signin') {
    signInGoogle();
  } else if (action === 'signout') {
    auth.signOut();
  } else if (action === 'tab') {
    state.tab = el.getAttribute('data-tab');
    state.flipped = false;
    if (state.tab === 'cards') rebuildDeck(); // re-check what is due
    render();
  } else if (action === 'lookup') {
    doLookup();
  } else if (action === 'save-sense') {
    saveSense(parseInt(el.getAttribute('data-i'), 10));
  } else if (action === 'own-example') {
    ownExample(parseInt(el.getAttribute('data-i'), 10));
  } else if (action === 'manual-from-search') {
    manualFromSearch();
  } else if (action === 'cancel-senses') {
    state.senses = null;
    render();
  } else if (action === 'toggle-form') {
    state.showForm = !state.showForm;
    state.formError = '';
    state.formNotice = '';
    render();
  } else if (action === 'add-word') {
    addWord();
  } else if (action === 'edit') {
    startEdit(el.getAttribute('data-id'));
  } else if (action === 'save-edit') {
    saveEdit();
  } else if (action === 'cancel-edit') {
    cancelEdit();
  } else if (action === 'delete') {
    deleteWord(el.getAttribute('data-id'));
  } else if (action === 'export') {
    exportWords();
  } else if (action === 'import') {
    document.getElementById('importFile').click();
  } else if (action === 'speak') {
    speak(el.getAttribute('data-word'));
  } else if (action === 'flip') {
    state.flipped = !state.flipped;
    var inner = document.getElementById('cardInner');
    if (inner) inner.classList.toggle('flipped', state.flipped);
  } else if (action === 'prev-card') {
    state.flipped = false;
    state.lastRating = '';
    state.cardIndex = (state.cardIndex - 1 + state.deckIds.length) % state.deckIds.length;
    render();
  } else if (action === 'next-card') {
    state.flipped = false;
    state.lastRating = '';
    state.cardIndex = (state.cardIndex + 1) % state.deckIds.length;
    render();
  } else if (action === 'rate-good') {
    rateCard(true);
  } else if (action === 'rate-again') {
    rateCard(false);
  } else if (action === 'deck-mode') {
    state.deckMode = el.getAttribute('data-mode');
    resetSession();
    rebuildDeck();
    render();
  } else if (action === 'restart-session') {
    resetSession();
    rebuildDeck();
    if (state.deckShuffled) state.deckIds = shuffle(state.deckIds);
    render();
  } else if (action === 'shuffle-deck') {
    shuffleDeck();
  } else if (action === 'reset-deck') {
    resetDeck();
  } else if (action === 'start-quiz') {
    startQuiz();
  } else if (action === 'answer') {
    answerQuiz(el.getAttribute('data-choice'));
  } else if (action === 'next-q') {
    nextQuestion();
  }
});

// File chosen for import
document.getElementById('importFile').addEventListener('change', function (e) {
  var file = e.target.files && e.target.files[0];
  e.target.value = ''; // allow re-selecting the same file later
  if (file) importFromFile(file);
});

// Keep typed values in state so re-renders never lose them
document.addEventListener('input', function (e) {
  if (e.target.id === 'searchInput') state.searchTerm = e.target.value;
  var field = e.target.getAttribute && e.target.getAttribute('data-form');
  if (field) state.form[field] = e.target.value;
  var editField = e.target.getAttribute && e.target.getAttribute('data-editform');
  if (editField) state.editForm[editField] = e.target.value;
});

// Enter key triggers lookup
document.addEventListener('keydown', function (e) {
  if (e.key === 'Enter' && e.target.id === 'searchInput') doLookup();
});

// ---------- Go ----------
render();
</script>
</body>
</html>
